- name: Update README with latest m3u
        run: |
          M3U_CONTENT=$(sed 's/`/\\`/g' output/result.m3u)
          echo "Updating README.md..."
          awk -v content="$M3U_CONTENT" '
            BEGIN {in_block=0}
            {
              if ($0 ~ /{{M3U_CONTENT}}/) {
                print content
                in_block=1
              } else if (in_block && $0 ~ /```/) {
                in_block=0
              } else if (!in_block) {
                print $0
              }
            }
          ' README.md > README_new.md
          mv README_new.md README.md

      - name: Commit result and README
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add output/result.m3u README.md
          git commit -m "Auto update IPTV and README" || echo "No changes"
          git push
